<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingStrands — Login</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-container {
    width: 100%; max-width: 380px; padding: 16px;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 32px 28px;
  }
  .login-card h1 {
    font-size: 1.2rem; color: var(--blue); margin-bottom: 4px;
    text-align: center;
  }
  .login-card .subtitle {
    text-align: center; color: var(--dim); font-size: 0.8rem;
    margin-bottom: 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block; font-size: 0.75rem; color: var(--dim);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px;
    font-family: inherit; font-size: 0.9rem;
  }
  .form-group input:focus {
    outline: none; border-color: var(--blue);
  }
  .login-btn {
    width: 100%; padding: 10px;
    background: #1f6feb; border: 1px solid #1f6feb;
    color: #fff; border-radius: 4px;
    font-family: inherit; font-size: 0.9rem; font-weight: bold;
    cursor: pointer; margin-top: 8px;
  }
  .login-btn:hover { background: #388bfd; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: #3a1a1a; border: 1px solid #f85149;
    color: var(--red); padding: 8px 12px; border-radius: 4px;
    font-size: 0.8rem; margin-bottom: 16px; text-align: center;
  }
  .footer {
    text-align: center; margin-top: 16px;
    font-size: 0.7rem; color: var(--dim);
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h1>TradingStrands</h1>
    <div class="subtitle">Sign in to continue</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>
  </div>
  <div class="footer">Protected trading system. Authorized users only.</div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function() {
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
});
</script>
</body>
</html>
