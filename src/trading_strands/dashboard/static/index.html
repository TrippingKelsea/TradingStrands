<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingStrands Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { font-size: 1.1rem; color: var(--blue); margin-bottom: 4px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; }
  .header .status { font-size: 0.85rem; }
  .status-running { color: var(--green); }
  .status-halted { color: var(--red); font-weight: bold; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; }
  .panel h2 { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .metric { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; }
  .metric .label { color: var(--dim); }
  .metric .value { font-weight: bold; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; color: var(--dim); font-weight: normal; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .feed { max-height: 300px; overflow-y: auto; }
  .feed-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
  .feed-item .time { color: var(--dim); font-size: 0.7rem; }
  .feed-item.executed { border-left: 3px solid var(--green); padding-left: 8px; }
  .feed-item.rejected { border-left: 3px solid var(--red); padding-left: 8px; }
  .drawdown-bar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 4px; overflow: hidden; }
  .drawdown-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .severity-halt-and-stop { color: var(--yellow); }
  .severity-halt-and-liquidate { color: var(--red); font-weight: bold; }
  .severity-halt-and-sell-gains { color: var(--yellow); }
  .full-width { grid-column: 1 / -1; }
  .disconnected { opacity: 0.5; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>TradingStrands</h1>
    <span class="status" id="status">Connecting...</span>
  </div>
  <div style="text-align:right; font-size:0.8rem; color:var(--dim)">
    <div>Tick: <span id="tick">-</span></div>
    <div>Updated: <span id="last-update">-</span></div>
  </div>
</div>

<div class="grid">
  <div class="panel" id="account-panel">
    <h2>Account</h2>
    <div class="metric"><span class="label">Equity</span><span class="value" id="equity">-</span></div>
    <div class="metric"><span class="label">Realized PnL</span><span class="value" id="realized-pnl">-</span></div>
    <div class="metric"><span class="label">Drawdown</span><span class="value" id="drawdown">-</span></div>
    <div class="drawdown-bar"><div class="drawdown-fill" id="drawdown-bar" style="width:0%;background:var(--green)"></div></div>
  </div>

  <div class="panel" id="whatif-panel">
    <h2>What-If</h2>
    <div class="metric"><span class="label">Tracked</span><span class="value" id="whatif-count">-</span></div>
    <div class="metric"><span class="label">Opportunity Cost</span><span class="value" id="whatif-pnl">-</span></div>
    <div class="metric"><span class="label">Best Missed</span><span class="value" id="whatif-best">-</span></div>
    <div class="metric"><span class="label">Worst Missed</span><span class="value" id="whatif-worst">-</span></div>
  </div>

  <div class="panel full-width">
    <h2>Positions</h2>
    <table>
      <thead><tr><th>Symbol</th><th>Qty</th><th>Cost Basis</th><th>Price</th><th>Unrealized PnL</th></tr></thead>
      <tbody id="positions-body"></tbody>
    </table>
    <div id="no-positions" style="color:var(--dim);font-size:0.8rem;padding:8px 0;">No open positions</div>
  </div>

  <div class="panel">
    <h2>Trade Feed</h2>
    <div class="feed" id="trade-feed">
      <div style="color:var(--dim);font-size:0.8rem;">Waiting for trades...</div>
    </div>
  </div>

  <div class="panel">
    <h2>Kill Switch Log</h2>
    <div class="feed" id="killswitch-feed">
      <div style="color:var(--dim);font-size:0.8rem;">No events</div>
    </div>
  </div>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);
  let tradeFeedItems = [];
  let ksItems = [];

  function fmt(v) {
    const n = parseFloat(v);
    if (isNaN(n)) return v || '-';
    return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function pnlClass(v) {
    const n = parseFloat(v);
    if (n > 0) return 'positive';
    if (n < 0) return 'negative';
    return '';
  }

  function timeStr(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toLocaleTimeString();
  }

  function updateSnapshot(snap) {
    // Header
    const halted = snap.risk && snap.risk.desk_halted;
    $('status').textContent = halted ? 'HALTED' : 'Running';
    $('status').className = 'status ' + (halted ? 'status-halted' : 'status-running');
    $('tick').textContent = snap.tick || 0;
    $('last-update').textContent = snap.timestamp ? new Date(snap.timestamp * 1000).toLocaleTimeString() : '-';

    // Account — use first ledger
    const ledgers = snap.ledgers || {};
    const botId = Object.keys(ledgers)[0];
    if (botId) {
      const l = ledgers[botId];
      $('equity').textContent = '$' + fmt(l.equity);
      const rpnl = parseFloat(l.realized_pnl || 0);
      $('realized-pnl').textContent = (rpnl >= 0 ? '+$' : '-$') + fmt(Math.abs(rpnl));
      $('realized-pnl').className = 'value ' + pnlClass(rpnl);
      const dd = (parseFloat(l.drawdown_pct || 0) * 100);
      $('drawdown').textContent = dd.toFixed(1) + '%';
      const bar = $('drawdown-bar');
      bar.style.width = Math.min(dd / 15 * 100, 100) + '%';
      bar.style.background = dd > 10 ? 'var(--red)' : dd > 5 ? 'var(--yellow)' : 'var(--green)';

      // Positions
      const positions = l.positions || [];
      const prices = snap.prices || {};
      const tbody = $('positions-body');
      tbody.innerHTML = '';
      $('no-positions').style.display = positions.length ? 'none' : 'block';
      positions.forEach(p => {
        const price = parseFloat(prices[p.symbol] || 0);
        const upnl = (price - parseFloat(p.burdened_cost_basis)) * parseFloat(p.quantity);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.symbol}</td><td>${fmt(p.quantity)}</td><td>$${fmt(p.burdened_cost_basis)}</td><td>$${fmt(price)}</td><td class="${pnlClass(upnl)}">${upnl >= 0 ? '+' : ''}$${fmt(Math.abs(upnl))}</td>`;
        tbody.appendChild(tr);
      });
    }

    // What-If
    if (snap.whatif) {
      const w = snap.whatif;
      $('whatif-count').textContent = w.total_entries || 0;
      const wpnl = parseFloat(w.total_unrealized_pnl || 0);
      $('whatif-pnl').textContent = (wpnl >= 0 ? '+$' : '-$') + fmt(Math.abs(wpnl));
      $('whatif-pnl').className = 'value ' + pnlClass(wpnl);
      $('whatif-best').textContent = w.best_missed ? w.best_missed.symbol + ' +$' + fmt(w.best_missed.pnl) : '-';
      $('whatif-worst').textContent = w.worst_missed ? w.worst_missed.symbol + ' $' + fmt(w.worst_missed.pnl) : '-';
    }
  }

  function addTradeEvent(ev) {
    const feed = $('trade-feed');
    if (tradeFeedItems.length === 0) feed.innerHTML = '';

    const div = document.createElement('div');
    const isExec = ev.event_type === 'trade.executed';
    div.className = 'feed-item ' + (isExec ? 'executed' : 'rejected');
    const d = ev.data || {};
    div.innerHTML = `<div class="time">${timeStr(ev.timestamp)}</div>
      <div>${isExec ? 'EXEC' : 'REJECT'} ${d.action || ''} ${d.quantity || ''} ${d.symbol || ''}${d.reason ? ' — ' + d.reason : ''}${d.rationale ? ' — ' + d.rationale : ''}</div>`;
    feed.prepend(div);
    tradeFeedItems.unshift(ev);
    if (tradeFeedItems.length > 50) {
      feed.removeChild(feed.lastChild);
      tradeFeedItems.pop();
    }
  }

  function addKillSwitchEvent(ev) {
    const feed = $('killswitch-feed');
    if (ksItems.length === 0) feed.innerHTML = '';

    const div = document.createElement('div');
    const verb = (ev.data && ev.data.verb) || 'unknown';
    div.className = 'feed-item severity-' + verb;
    div.innerHTML = `<div class="time">${timeStr(ev.timestamp)}</div><div>${verb}: ${(ev.data && ev.data.reason) || ''}</div>`;
    feed.prepend(div);
    ksItems.unshift(ev);
  }

  // SSE connection
  function connect() {
    const es = new EventSource('/api/stream');
    es.onmessage = function(e) {
      try {
        const snap = JSON.parse(e.data);
        if (!snap.error) updateSnapshot(snap);
      } catch(err) { console.error('Parse error', err); }
    };
    es.onerror = function() {
      $('status').textContent = 'Disconnected';
      $('status').className = 'status status-halted';
      document.body.classList.add('disconnected');
      es.close();
      setTimeout(connect, 5000);
    };
    es.onopen = function() {
      document.body.classList.remove('disconnected');
    };
  }

  // Also poll events separately
  async function pollEvents() {
    try {
      const resp = await fetch('/api/events');
      const events = await resp.json();
      events.reverse().forEach(ev => {
        const already = tradeFeedItems.some(t => t.pk === ev.pk) || ksItems.some(k => k.pk === ev.pk);
        if (already) return;
        if (ev.event_type === 'killswitch') addKillSwitchEvent(ev);
        else addTradeEvent(ev);
      });
    } catch(e) { /* ignore */ }
  }

  connect();
  pollEvents();
  setInterval(pollEvents, 5000);
})();
</script>
</body>
</html>
