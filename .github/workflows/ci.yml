name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: astral-sh/ruff-action@v3

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest --tb=short -q

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push trading image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/trading-strands:$IMAGE_TAG -t $ECR_REGISTRY/trading-strands:latest .
          docker push $ECR_REGISTRY/trading-strands:$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-strands:latest

      - name: Build and push dashboard image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/trading-strands:dashboard-$IMAGE_TAG -t $ECR_REGISTRY/trading-strands:dashboard .
          docker push $ECR_REGISTRY/trading-strands:dashboard-$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-strands:dashboard

      - name: Seed Alpaca credentials in Secrets Manager
        env:
          ALPACA_PAPER_KEY: ${{ secrets.ALPACA_PAPER_KEY }}
          ALPACA_PAPER_SECRET: ${{ secrets.ALPACA_PAPER_SECRET }}
        run: |
          aws secretsmanager put-secret-value \
            --secret-id trading-strands/alpaca \
            --secret-string "{\"ALPACA_API_KEY\":\"${ALPACA_PAPER_KEY}\",\"ALPACA_SECRET_KEY\":\"${ALPACA_PAPER_SECRET}\",\"ALPACA_PAPER\":\"true\"}" \
            2>/dev/null || true

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Deploy CDK stack
        working-directory: infra
        run: |
          pip install -r requirements.txt
          cdk deploy --require-approval never
