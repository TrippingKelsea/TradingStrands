name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: astral-sh/ruff-action@v3

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest --tb=short -q

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-west-2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names trading-strands 2>/dev/null || \
          aws ecr create-repository --repository-name trading-strands

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push trading image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/trading-strands:$IMAGE_TAG -t $ECR_REGISTRY/trading-strands:latest .
          docker push $ECR_REGISTRY/trading-strands:$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-strands:latest

      - name: Build and push dashboard image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/trading-strands:dashboard-$IMAGE_TAG -t $ECR_REGISTRY/trading-strands:dashboard .
          docker push $ECR_REGISTRY/trading-strands:dashboard-$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-strands:dashboard

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Deploy CDK stack
        working-directory: infra
        run: |
          pip install -r requirements.txt
          cdk deploy --require-approval never \
            -c domain=app.tradingstrands.xyz \
            -c zone_name=tradingstrands.xyz \
            -c zone_id=Z04993921Q8ZI5T322JJX

      - name: Force ECS services to pull latest images
        run: |
          CLUSTER=$(aws ecs list-clusters --query 'clusterArns[0]' --output text)
          for SVC in $(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text); do
            aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --force-new-deployment --query 'service.status'
          done

      - name: Seed Cognito client secret
        run: |
          # Get the client secret from Cognito and store in Secrets Manager
          POOL_ID=$(aws cloudformation describe-stacks --stack-name TradingStrandsStack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks --stack-name TradingStrandsStack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoClientId'].OutputValue" --output text)
          CLIENT_SECRET=$(aws cognito-idp describe-user-pool-client \
            --user-pool-id "$POOL_ID" --client-id "$CLIENT_ID" \
            --query 'UserPoolClient.ClientSecret' --output text)
          aws secretsmanager create-secret \
            --name trading-strands/cognito-client-secret \
            --secret-string "$CLIENT_SECRET" 2>/dev/null || \
          aws secretsmanager put-secret-value \
            --secret-id trading-strands/cognito-client-secret \
            --secret-string "$CLIENT_SECRET"

      - name: Seed Alpaca credentials in Secrets Manager
        env:
          ALPACA_PAPER_KEY: ${{ secrets.ALPACA_PAPER_KEY }}
          ALPACA_PAPER_SECRET: ${{ secrets.ALPACA_PAPER_SECRET }}
        run: |
          aws secretsmanager put-secret-value \
            --secret-id trading-strands/alpaca \
            --secret-string "{\"ALPACA_API_KEY\":\"${ALPACA_PAPER_KEY}\",\"ALPACA_SECRET_KEY\":\"${ALPACA_PAPER_SECRET}\",\"ALPACA_PAPER\":\"true\"}"
